<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Biograpi · 360° ხედები</title>
<style>
  :root{--bg:#0d0f12;--card:#16191e;--txt:#f2f4f7;--mut:#9aa3ad;--acc:#c9a227;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,Segoe UI,Roboto,'Noto Sans Georgian',sans-serif;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px}
  h1{font-size:22px;font-weight:800;letter-spacing:.02em;margin:0 0 4px}
  p.sub{color:var(--mut);margin:0 0 28px;font-size:14px}
  .grid{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;width:100%;max-width:760px}
  a.card{flex:1 1 300px;text-decoration:none;color:inherit;background:var(--card);
    border:1px solid #23262c;border-radius:16px;padding:22px;transition:.18s;display:block}
  a.card:hover{border-color:var(--acc);transform:translateY(-2px)}
  .card .num{font-size:13px;color:var(--acc);font-weight:700;letter-spacing:.08em}
  .card .title{font-size:17px;font-weight:700;margin-top:6px}
  .card .go{margin-top:14px;color:var(--mut);font-size:13px}
  footer{margin-top:30px;color:var(--mut);font-size:12px}
</style>
</head>
<body>
  <h1>Biograpi · 360° საჰაერო ხედები</h1>
  <p class="sub">აირჩიე პანორამა</p>
  <div class="grid">
    <a class="card" href="1.html"><div class="num">360° · 01</div><div class="title">პანორამა 1</div><div class="go">გახსნა →</div></a>
    <a class="card" href="2.html"><div class="num">360° · 02</div><div class="title">პანორამა 2</div><div class="go">გახსნა →</div></a>
  </div>
  <footer>© Biograpi</footer>
</body>
</html>
