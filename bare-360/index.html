<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BARE by Biograpi · 360°</title>
<style>
  :root{--bg:#7C3146;--card:#1B1521;--txt:#EDE7D1;--mut:#c9a9b3;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,Segoe UI,Roboto,'Noto Sans Georgian',sans-serif;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px}
  .logo{height:66px;width:auto;margin-bottom:26px;filter:drop-shadow(0 4px 14px rgba(0,0,0,.35))}
  p.sub{color:var(--mut);margin:0 0 26px;font-size:14px;letter-spacing:.02em}
  .grid{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;width:100%;max-width:720px}
  a.card{flex:1 1 300px;text-decoration:none;color:var(--txt);background:var(--card);
    border:1px solid rgba(237,231,209,.14);border-radius:16px;padding:22px;transition:.18s;display:block}
  a.card:hover{border-color:var(--txt);transform:translateY(-2px)}
  .card .num{font-size:12px;color:var(--mut);font-weight:700;letter-spacing:.12em}
  .card .title{font-size:17px;font-weight:700;margin-top:6px}
  .card .go{margin-top:14px;color:var(--mut);font-size:13px}
  footer{margin-top:28px;color:var(--mut);font-size:12px;letter-spacing:.04em}
</style>
</head>
<body>
  <img class="logo" src="logo.png" alt="BARE by Biograpi">
  <p class="sub">360° საჰაერო ხედები</p>
  <div class="grid">
    <a class="card" href="1.html"><div class="num">360° · 01</div><div class="title">ხედი 1</div><div class="go">გახსნა →</div></a>
    <a class="card" href="2.html"><div class="num">360° · 02</div><div class="title">ხედი 2</div><div class="go">გახსნა →</div></a>
  </div>
  <footer>BARE · BY BIOGRAPI</footer>
</body>
</html>
